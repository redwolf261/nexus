# NEXUS Backend Blueprint for Render
# Auto-provisions a PostgreSQL database and the FastAPI web service.
# Neo4j is NOT hosted here — set NEO4J_URI / NEO4J_USER / NEO4J_PASSWORD
# manually in the Render dashboard (from your AuraDB instance).

databases:
  - name: nexus-db
    databaseName: nexus_db
    user: nexus
    plan: free

services:
  - type: web
    name: nexus-api
    runtime: python
    plan: free
    buildCommand: "pip install -r backend/requirements.txt"
    startCommand: "uvicorn backend.main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /health
    envVars:
      # DATABASE_URL is injected automatically from the nexus-db database above
      - key: DATABASE_URL
        fromDatabase:
          name: nexus-db
          property: connectionString
      # Neo4j AuraDB — set NEO4J_URI and NEO4J_PASSWORD via the Render dashboard.
      # NOTE: for THIS AuraDB instance the username is the instance id "cd5efd2d",
      # NOT the usual "neo4j". URI example: neo4j+s://cd5efd2d.databases.neo4j.io
      # (use neo4j+ssc:// if TLS cert verification fails).
      - key: NEO4J_URI
        sync: false
      - key: NEO4J_USER
        value: cd5efd2d
      - key: NEO4J_PASSWORD
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.9"
